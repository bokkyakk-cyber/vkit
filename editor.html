<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Vkit 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ece9f8;
  --accent:#7c5af0;
  --ag:linear-gradient(135deg,#7c5af0,#b39dfc);
  --gw2:rgba(255,255,255,.78);--gw3:rgba(255,255,255,.93);
  --gb:rgba(255,255,255,.82);
  --gs-sm:0 3px 14px rgba(124,90,240,.11),0 1px 4px rgba(0,0,0,.04);
  --gs-lg:0 20px 60px rgba(124,90,240,.22),0 4px 16px rgba(0,0,0,.07);
  --text-1:#1a1535;--text-2:#5a5080;--text-3:#9890c0;
  --danger:#e84040;
  --r:18px;--r-md:12px;--r-sm:9px;--r-xs:6px;
  --font:'Geist',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);color:var(--text-1);-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:var(--bg);background-image:radial-gradient(ellipse at 5% 0%,rgba(180,150,255,.38) 0%,transparent 45%),radial-gradient(ellipse at 95% 100%,rgba(124,90,240,.2) 0%,transparent 45%)}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 clamp(16px,4vw,48px);height:64px;background:rgba(245,243,255,0.82);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid rgba(255,255,255,0.72);box-shadow:0 1px 0 rgba(180,170,255,0.12);z-index:100}
#topbar .nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#1A1830;letter-spacing:-0.5px;flex-shrink:0}
#topbar .logo-icon{width:34px;height:34px;flex-shrink:0}
#topbar .nav-btn{background:linear-gradient(135deg,#7B72FF,#A78BFA);color:#fff;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(123,114,255,0.22);transition:all 0.2s;white-space:nowrap;font-family:inherit}
#topbar .nav-btn:hover{transform:translateY(-1px)}
#topbar .nav-btn-ghost{background:rgba(123,114,255,0.08);color:#7B72FF;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;border:1.5px solid rgba(123,114,255,0.2);cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:inherit}
#topbar .nav-btn-ghost:hover{background:rgba(123,114,255,0.15)}

#topbar h1{font-size:13.5px;font-weight:700;color:var(--text-1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.02em}
.cbadge{padding:3px 10px;font-size:9px;font-weight:700;background:var(--ag);color:#fff;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 3px 10px rgba(124,90,240,.3);flex-shrink:0}
.tb{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:11.5px;font-weight:600;font-family:var(--font);border-radius:var(--r-sm);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;border:none}
.tb-ghost{background:rgba(255,255,255,0.6);color:#7B78A8;border:1.5px solid rgba(255,255,255,0.8);box-shadow:0 2px 8px rgba(123,114,255,0.08)}
.tb-ghost:hover{background:var(--gw3);color:var(--text-1)}
.tb-danger{background:rgba(232,64,64,.11);color:var(--danger);border:1.5px solid rgba(232,64,64,.24)}
.tb-primary{background:linear-gradient(135deg,#7B72FF,#A78BFA);color:#fff;box-shadow:0 4px 16px rgba(123,114,255,0.35);border:none}
.tb-primary:hover{box-shadow:0 6px 22px rgba(124,90,240,.52);transform:translateY(-1px)}
.tb-right{margin-left:auto;display:flex;gap:6px;align-items:center}
#week-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.wnav-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:1.5px solid var(--gb);border-radius:var(--r-sm);background:var(--gw2);color:var(--text-2);cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0}
.wnav-btn:hover:not(:disabled){background:var(--gw3);color:var(--text-1)}
.wnav-btn:disabled{opacity:.3;cursor:default}
.week-label{font-size:11px;font-weight:700;color:var(--text-2);white-space:nowrap;min-width:130px;text-align:center;letter-spacing:-.01em}
.week-label span{font-size:9px;font-weight:500;color:var(--text-3);display:block;margin-top:1px}
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;min-height:0}
#canvas-cont{position:relative;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--gs-lg);border:2px solid var(--gb);flex-shrink:0}
#tmpl-canvas{display:block}
#illus-ov{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
#illus-ov.active{pointer-events:all;touch-action:none}
#sidebar{width:310px;min-width:310px;display:flex;flex-direction:column;overflow:hidden;background:rgba(255,255,255,.42);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-left:1.5px solid var(--gb)}
#sidebar-inner{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
#sidebar-inner::-webkit-scrollbar{width:3px}
#sidebar-inner::-webkit-scrollbar-thumb{background:rgba(124,90,240,.18);border-radius:2px}
#edit-ov{position:absolute;inset:0;pointer-events:none;z-index:10}
#edit-ov.active{pointer-events:all}
#edit-ta{position:absolute;background:transparent;border:2px solid var(--accent);outline:none;resize:none;overflow:hidden;padding:4px;color:rgba(0,0,0,.01);caret-color:var(--accent);border-radius:5px;box-shadow:0 0 0 4px rgba(124,90,240,.14);font-family:inherit;pointer-events:all;display:none}
.gcard{background:rgba(255,255,255,.56);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1.5px solid var(--gb);border-radius:var(--r);box-shadow:var(--gs-sm);overflow:hidden}
.gcard-body{background:linear-gradient(145deg,rgba(255,255,255,.3),rgba(255,255,255,.05));padding:12px;display:flex;flex-direction:column;gap:10px}
.illus-drop{border:2px dashed rgba(124,90,240,.28);border-radius:var(--r-md);padding:18px 14px;text-align:center;cursor:pointer;transition:all .18s;background:rgba(124,90,240,.04);display:flex;flex-direction:column;align-items:center;gap:6px}
.illus-drop:hover,.illus-drop.dragover{border-color:var(--accent);background:rgba(124,90,240,.1)}
.illus-drop.has{border-style:solid;border-color:var(--accent);background:rgba(124,90,240,.08)}
.illus-drop .di{font-size:24px}.illus-drop .dt{font-size:11.5px;color:var(--text-3);font-weight:500}
.illus-drop.has .dt{color:var(--accent);font-weight:700}
.ibtns{display:flex;gap:6px}
.ibtn{flex:1;padding:7px;font-size:11px;font-weight:600;font-family:var(--font);border-radius:var(--r-sm);cursor:pointer;transition:all .13s;display:flex;align-items:center;justify-content:center;gap:4px}
.ibtn-p{background:rgba(124,90,240,.11);color:var(--accent);border:1.5px solid rgba(124,90,240,.26)}
.ibtn-p:hover{background:rgba(124,90,240,.2)}
.ibtn-d{background:rgba(232,64,64,.09);color:var(--danger);border:1.5px solid rgba(232,64,64,.22)}
.ibtn-d:hover{background:rgba(232,64,64,.17)}
.ictrl{display:flex;flex-direction:column;gap:7px}
.crow{display:flex;align-items:center;gap:8px}
.clbl{font-size:10px;font-weight:700;color:var(--text-2);width:26px;flex-shrink:0}
.crange{flex:1;accent-color:var(--accent);cursor:pointer}
.cval{font-size:10px;color:var(--text-3);width:34px;text-align:right;font-weight:600;flex-shrink:0}
.ihint{font-size:10px;color:var(--text-2);line-height:1.6;background:rgba(124,90,240,.06);padding:6px 10px;border-radius:var(--r-xs);border:1px solid rgba(124,90,240,.11)}
.day-block{border-radius:var(--r-md);overflow:hidden;box-shadow:var(--gs-sm)}
.day-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;border:none;background:var(--ag);color:#fff;font-size:13px;font-weight:700;font-family:var(--font);transition:all .16s;}
.day-btn.sat{background:linear-gradient(135deg,#0ea5e9,#38bdf8)}
.day-btn.sun{background:linear-gradient(135deg,#e84040,#f87171)}
.day-btn:hover{filter:brightness(1.08)}
.day-btn-left{display:flex;align-items:center;gap:10px}
.day-name{font-size:14px;font-weight:800}
.day-date{font-size:11px;font-weight:400;opacity:.82}
.day-arrow{font-size:11px;opacity:.85;transition:transform .18s}
.day-block.open .day-arrow{transform:rotate(180deg)}
.day-body{display:none;flex-direction:column;gap:8px;padding:12px;background:rgba(255,255,255,.58);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid var(--gb);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);}
.day-block.open .day-body{display:flex}
.tog-card{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(255,255,255,.54);border:1.5px solid var(--gb);border-radius:var(--r-sm);box-shadow:var(--gs-sm);transition:all .18s}
.tog-card.off-on{border-color:rgba(232,64,64,.38);background:rgba(255,215,215,.32)}
.tl{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.tl-off{color:var(--danger)}
.sw-wrap{position:relative;display:inline-block;width:42px;height:23px;cursor:pointer;flex-shrink:0}
.sw-wrap input{opacity:0;width:0;height:0}
.sw-sl{position:absolute;inset:0;background:rgba(0,0,0,.12);border-radius:12px;transition:.22s;border:1.5px solid rgba(255,255,255,.45)}
.sw-sl:before{content:'';position:absolute;width:17px;height:17px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.22s;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.sw-off input:checked+.sw-sl{background:linear-gradient(135deg,#e84040,#f87171);border-color:transparent;box-shadow:0 3px 10px rgba(232,64,64,.28)}
.sw-off input:checked+.sw-sl:before{transform:translateX(19px)}
.fcard{background:rgba(255,255,255,.56);border:1.5px solid var(--gb);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--gs-sm)}
.fcard-head{padding:8px 12px;background:linear-gradient(135deg,rgba(124,90,240,.1),rgba(179,157,252,.05));border-bottom:1px solid rgba(124,90,240,.1);font-size:10.5px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.fcard-body{padding:10px;display:flex;flex-direction:column;gap:8px}
.fwrap{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;font-weight:700;color:var(--text-2);display:flex;align-items:center;gap:4px}
.fctrl{width:100%;font-size:13.5px;font-family:var(--font);padding:9px 11px;border:1.5px solid rgba(200,190,240,.48);border-radius:var(--r-sm);background:rgba(255,255,255,.74);color:var(--text-1);transition:all .15s;resize:none;-webkit-appearance:none;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
.fctrl:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.95);box-shadow:0 0 0 3px rgba(124,90,240,.14)}
textarea.fctrl{min-height:64px}
.empty-p{padding:20px;text-align:center;font-size:11.5px;color:var(--text-3);line-height:1.8;background:rgba(255,255,255,.38);border:1.5px dashed rgba(124,90,240,.14);border-radius:var(--r-sm)}
@media(max-width:768px){
  html,body,#app{overflow:hidden;height:100%}
  #main{flex-direction:column}
  #canvas-area{flex:none;height:45vh;min-height:200px;padding:10px 10px 6px;overflow:auto}
  #sidebar{width:100%;min-width:auto;flex:1;border-left:none;border-top:1.5px solid var(--gb);overflow:hidden;display:flex;flex-direction:column}
  #sidebar-inner{flex:1;overflow-y:auto}
  .tb span{display:none}
}
</style>
</head>

    <linearGradient id="panelB3" x1="10" y1="14" x2="24" y2="28"><stop stop-color="#7B72FF"/><stop offset="1" stop-color="#A5C8FF"/></linearGradient>

<input type="file" id="illus-file" accept="image/*" style="display:none" onchange="onIllusLoad(event)">
<script>
// ── Supabase 설정 ─────────────────────────────────────
const SUPABASE_URL='https://fvuyimvkozbcnzudxsdp.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dXlpbXZrb3piY256dWR4c2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg0MTAsImV4cCI6MjA5NTgwNDQxMH0.gxl9EGtn8zTHmzzp_8EEKipGCik6t5q5WeU1sHnKW4I';
const ROLE_LABELS={"mainText":"메인타이틀","subText":"서브타이틀","timeText":"시간","offImage":"OFF이미지","bgObject":"배경오브젝트","date":"날짜","memo":"메모"};const DAYS=["월","화","수","목","금","토","일"];

// ── URL 파라미터 ──
const TEMPLATE_ID=new URLSearchParams(location.search).get('template_id');
const TRIAL_MODE=new URLSearchParams(location.search).get('trial')==='true';

// ── 전역 상태 ── (initEditor()에서 채워짐)
let layers=[];
let groups={};
let loadedFonts=[];
let bgData=null;let canvasW=1920,canvasH=1080;
let SK='vkit_editor_v1';

// ── 로딩/에러 UI ─────────────────────────────────────
function showLoading(msg){
  let ov=document.getElementById('init-overlay');
  if(!ov){
    ov=document.createElement('div');ov.id='init-overlay';
    ov.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;background-image:radial-gradient(ellipse at 5% 0%,rgba(180,150,255,.38) 0%,transparent 45%)';
    ov.innerHTML='<div style="font-size:32px">✨</div><div id="init-msg" style="font-size:14px;font-weight:600;color:var(--text-2)"></div><div style="width:180px;height:3px;background:rgba(124,90,240,.12);border-radius:2px;overflow:hidden"><div style="height:100%;width:40%;background:var(--accent);border-radius:2px;animation:_ba 1.2s ease-in-out infinite alternate"></div></div><style>@keyframes _ba{to{width:88%}}</style>';
    document.body.appendChild(ov);
  }
  document.getElementById('init-msg').textContent=msg;
}
function hideLoading(){const ov=document.getElementById('init-overlay');if(ov){ov.style.transition='opacity .3s';ov.style.opacity='0';setTimeout(()=>ov.remove(),300);}}
function showError(title,sub,btnTxt,href){
  document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:\'Geist\',system-ui;background:var(--bg)"><div style="text-align:center;padding:40px;max-width:380px"><div style="font-size:44px;margin-bottom:16px">🔒</div><div style="font-size:18px;font-weight:700;color:var(--text-1);margin-bottom:8px">'+title+'</div><div style="font-size:13px;color:var(--text-2);line-height:1.7;margin-bottom:24px">'+sub+'</div><a href="'+href+'" style="display:inline-flex;align-items:center;padding:10px 24px;background:linear-gradient(135deg,#7c5af0,#9b6ff8);color:#fff;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;box-shadow:0 4px 16px rgba(124,90,240,.38)">'+btnTxt+'</a></div></div>';
}

// ── 세션 헬퍼 ─────────────────────────────────────────
function getSession(){
  try{
    for(const k of Object.keys(localStorage)){
      if(k.startsWith('sb-')&&k.endsWith('-auth-token')){
        const d=JSON.parse(localStorage.getItem(k));
        if(d?.access_token)return d;
      }
    }
  }catch(e){}
  return null;
}

// ── 메인 초기화 ───────────────────────────────────────
async function initEditor(){
  showLoading('에디터 불러오는 중...');
  if(!TEMPLATE_ID){showError('잘못된 접근','템플릿 ID가 없어요.','스토어로 돌아가기','/index.html');return;}
  // 체험모드면 로그인/구매 체크 스킵
  let uid='trial',tok=null;
  if(!TRIAL_MODE){
    const session=getSession();
    if(!session?.access_token){showError('로그인이 필요해요','에디터를 사용하려면 로그인이 필요해요.','로그인하기','/login.html?redirect='+encodeURIComponent(location.href));return;}
    uid=session.user?.id;
    tok=session.access_token;
    showLoading('구매 내역 확인 중...');
    try{
      const pr=await fetch(`${SUPABASE_URL}/rest/v1/purchases?user_id=eq.${uid}&template_id=eq.${TEMPLATE_ID}&status=in.(paid,done)&select=id&limit=1`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${tok}`}});
      const pdata=await pr.json();
      if(!Array.isArray(pdata)||!pdata.length){showError('구매가 필요해요','이 템플릿을 구매한 후 에디터를 사용할 수 있어요.','스토어에서 보기','/index.html');return;}
    }catch(e){showError('오류 발생','구매 확인 중 오류가 발생했어요.<br>'+e.message,'새로고침','javascript:location.reload()');return;}
  }
  showLoading('템플릿 불러오는 중...');
  try{
    const tr=await fetch(`${SUPABASE_URL}/rest/v1/templates?id=eq.${TEMPLATE_ID}&select=title,template_data,canvas_w,canvas_h&limit=1`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}});
    const tdata=await tr.json();
    if(!tdata?.length)throw new Error('템플릿을 찾을 수 없어요');
    const t=tdata[0];
    const d=JSON.parse(t.template_data);
    layers=d.layers||[];
    // 방송 ON 기본값: offImage 레이어는 항상 숨김으로 시작
    layers.forEach(l=>{if(l.isOffImage)l.visible=false;});
    groups=Object.assign({},d.groups||{});
    canvasW=d.canvasW||t.canvas_w||1920;
    canvasH=d.canvasH||t.canvas_h||1080;
    bgData=d.bgImage||null;
    SK=TRIAL_MODE?'__trial_no_save__':`vkit_${TEMPLATE_ID}_${uid}`;
    (d.loadedFonts||[]).forEach(f=>{if(f.type==='web'&&f.url){const l=document.createElement('link');l.rel='stylesheet';l.href=f.url;document.head.appendChild(l);}});
    document.title=(t.title||'템플릿')+' — Vkit 에디터';
    hideLoading();
    if(!TRIAL_MODE)loadSave();

  }catch(e){showError('불러오기 실패','템플릿 데이터를 불러오지 못했어요.<br>'+e.message,'새로고침','javascript:location.reload()');}
}

let undoStack=[];
let illusData=null,illusX=0,illusY=0,illusScale=1,illusRot=0;
let illusDragMode=null,illusDragStart={};
let openGid=null;
let weekOffset=0;

function getWD(){
  const now=new Date(),d=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(d===0?6:d-1)+(weekOffset*7));
  return DAYS.map((_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return(dd.getMonth()+1)+'/'+(dd.getDate());});
}
function getWeekRange(){
  const now=new Date(),d=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(d===0?6:d-1)+(weekOffset*7));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=function(dt){return(dt.getMonth()+1)+'/'+dt.getDate();};
  const labels=['이번 주','다음 주','다다음 주'];
  return{range:fmt(mon)+' ~ '+fmt(sun),label:labels[weekOffset]||'+'+weekOffset+'주'};
}
function updateWeekNav(){}
function changeWeek(dir){
  weekOffset=Math.max(0,Math.min(2,weekOffset+dir));
  buildUI();
}

const canvas=document.getElementById('tmpl-canvas');
const ctx=canvas.getContext('2d');
const ovCanvas=document.getElementById('illus-ov');
const ovCtx=ovCanvas.getContext('2d');
const imgCache={};

function gImg(src){
  if(!src)return null;
  if(imgCache[src])return imgCache[src];
  const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{render();drawIllusOv();};
  img.src=src;imgCache[src]=img;return img;
}

function initCanvas(){
  const area=document.getElementById('canvas-area');
  if(!area)return;
  const areaW=area.offsetWidth||window.innerWidth-310;
  const areaH=area.offsetHeight||window.innerHeight-52;
  const maxW=areaW-32,maxH=areaH-32;
  const s=Math.min(1,maxW/canvasW,maxH/canvasH);
  const dW=Math.round(canvasW*s),dH=Math.round(canvasH*s);
  canvas.width=dW;canvas.height=dH;
  canvas.style.cssText='width:'+dW+'px;height:'+dH+'px;display:block';
  ovCanvas.width=dW;ovCanvas.height=dH;
  ovCanvas.style.cssText='position:absolute;top:0;left:0;width:'+dW+'px;height:'+dH+'px';
  document.getElementById('canvas-cont').style.cssText='position:relative;width:'+dW+'px;height:'+dH+'px';
  canvas.dataset.s=String(s);
  render();drawIllusOv();
}

function calcFit(l,c2){
  if(!l.autoFit)return l.fontSize;
  const mxF=Math.min(l.maxFontSize||l.fontSize,l.fontSize),mnF=l.minFontSize||8,lh=l.lineHeight||1.3,lns=(l.text||'').split(String.fromCharCode(10));
  let fs=mxF;
  while(fs>=mnF){c2.font=(l.fontWeight||'400')+' '+fs+"px '"+(l.fontFamily||'Geist')+"'";c2.letterSpacing=(l.letterSpacing||0)+'px';let mw=0;lns.forEach(ln=>{const m=c2.measureText(ln);if(m.width>mw)mw=m.width;});if(mw<=l.w&&lns.length*fs*lh<=l.h)break;fs=Math.max(mnF,fs-1);}
  return fs;
}
function drawTxt(c2,l){
  const s=parseFloat(canvas.dataset.s)||1;
  c2.save();
  if(l.rotate){const cx=(l.x+l.w/2)*s,cy=(l.y+l.h/2)*s;c2.translate(cx,cy);c2.rotate(l.rotate*Math.PI/180);c2.translate(-cx,-cy);}
  c2.beginPath();c2.rect(l.x*s,l.y*s,l.w*s,l.h*s);c2.clip();
  const fs=calcFit(l,c2)*s,lh=l.lineHeight||1.3,lns=(l.text||'').split(String.fromCharCode(10));
  c2.font=(l.fontWeight||'400')+' '+fs+"px '"+(l.fontFamily||'Geist')+"'";
  c2.letterSpacing=((l.letterSpacing||0)*s)+'px';
  c2.fillStyle=l.color||'#fff';c2.textAlign=l.align||'center';c2.textBaseline='middle';
  const tH=lns.length*fs*lh,ly=l.y*s,lh2=l.h*s;
  let sY=l.verticalAlign==='top'?ly+fs*lh*.5:l.verticalAlign==='bottom'?ly+lh2-tH+fs*lh*.5:ly+(lh2-tH)/2+fs*lh*.5;
  let tX=l.align==='left'?(l.x+4)*s:l.align==='right'?(l.x+l.w-4)*s:(l.x+l.w/2)*s;
  lns.forEach((ln,i)=>c2.fillText(ln,tX,sY+i*fs*lh));
  c2.restore();
}
function render(){
  const s=parseFloat(canvas.dataset.s)||1;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(illusData){const img=gImg(illusData);if(img&&img.complete&&img.naturalWidth){ctx.save();const iw=img.naturalWidth*illusScale,ih=img.naturalHeight*illusScale;const cx=(illusX+iw/2)*s,cy=(illusY+ih/2)*s;ctx.translate(cx,cy);ctx.rotate(illusRot*Math.PI/180);ctx.drawImage(img,-iw*s/2,-ih*s/2,iw*s,ih*s);ctx.restore();}}
  if(bgData){const img=gImg(bgData);if(img&&img.complete&&img.naturalWidth)ctx.drawImage(img,0,0,canvas.width,canvas.height);}
  layers.forEach(l=>{
    if(l.visible===false)return;ctx.globalAlpha=l.opacity??1;
    if(l.type==='image'&&l.src){const img=gImg(l.src);if(!img||!img.complete||!img.naturalWidth){ctx.globalAlpha=1;return;}if(l.rotate){const cx=(l.x+l.w/2)*s,cy=(l.y+l.h/2)*s;ctx.save();ctx.translate(cx,cy);ctx.rotate(l.rotate*Math.PI/180);ctx.drawImage(img,-l.w*s/2,-l.h*s/2,l.w*s,l.h*s);ctx.restore();}else ctx.drawImage(img,l.x*s,l.y*s,l.w*s,l.h*s);}
    else if(l.type==='text')drawTxt(ctx,l);
    ctx.globalAlpha=1;
  });
}

function drawIllusOv(){
  ovCtx.clearRect(0,0,ovCanvas.width,ovCanvas.height);
  if(!illusData)return;
  const img=gImg(illusData);if(!img||!img.complete||!img.naturalWidth)return;
  const s=parseFloat(canvas.dataset.s)||1;
  const iw=img.naturalWidth*illusScale*s,ih=img.naturalHeight*illusScale*s;
  const cx=(illusX+img.naturalWidth*illusScale/2)*s,cy=(illusY+img.naturalHeight*illusScale/2)*s;
  ovCtx.save();ovCtx.translate(cx,cy);ovCtx.rotate(illusRot*Math.PI/180);
  ovCtx.strokeStyle='rgba(124,90,240,.7)';ovCtx.lineWidth=2;ovCtx.setLineDash([6,4]);
  ovCtx.strokeRect(-iw/2,-ih/2,iw,ih);ovCtx.setLineDash([]);
  [[-iw/2,-ih/2],[iw/2,-ih/2],[iw/2,ih/2],[-iw/2,ih/2]].forEach(([hx,hy])=>{
    ovCtx.fillStyle='#fff';ovCtx.strokeStyle='#7c5af0';ovCtx.lineWidth=2;
    ovCtx.beginPath();ovCtx.arc(hx,hy,6,0,Math.PI*2);ovCtx.fill();ovCtx.stroke();
  });
  ovCtx.beginPath();ovCtx.moveTo(0,-ih/2);ovCtx.lineTo(0,-ih/2-22);ovCtx.strokeStyle='rgba(124,90,240,.5)';ovCtx.lineWidth=1.5;ovCtx.stroke();
  ovCtx.fillStyle='#fff';ovCtx.strokeStyle='#7c5af0';ovCtx.lineWidth=2;
  ovCtx.beginPath();ovCtx.arc(0,-ih/2-22,7,0,Math.PI*2);ovCtx.fill();ovCtx.stroke();
  ovCtx.fillStyle='#7c5af0';ovCtx.font='bold 11px sans-serif';ovCtx.textAlign='center';ovCtx.textBaseline='middle';ovCtx.fillText('\u21bb',0,-ih/2-22);
  ovCtx.restore();
}

function getEvtPt(e){const r=ovCanvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
function illusDown(e){
  if(!illusData)return;e.preventDefault();
  const{x,y}=getEvtPt(e);const img=gImg(illusData);if(!img)return;
  const s=parseFloat(canvas.dataset.s)||1;
  const iw=img.naturalWidth*illusScale*s,ih=img.naturalHeight*illusScale*s;
  const cx=(illusX+img.naturalWidth*illusScale/2)*s,cy=(illusY+img.naturalHeight*illusScale/2)*s;
  const rot=illusRot*Math.PI/180;
  const rhx=cx-Math.sin(rot)*(ih/2+22),rhy=cy-Math.cos(rot)*(ih/2+22);
  if(Math.hypot(x-rhx,y-rhy)<14){illusDragMode='rotate';illusDragStart={x,y,rot:illusRot,cx,cy};return;}
  const corners=[[-iw/2,-ih/2],[iw/2,-ih/2],[iw/2,ih/2],[-iw/2,ih/2]];
  for(const[hx,hy]of corners){const wx=cx+hx*Math.cos(rot)-hy*Math.sin(rot),wy=cy+hx*Math.sin(rot)+hy*Math.cos(rot);if(Math.hypot(x-wx,y-wy)<14){illusDragMode='scale';illusDragStart={x,y,scale:illusScale,cx,cy,hw:Math.abs(hx),hh:Math.abs(hy)};return;}}
  const dx=x-cx,dy=y-cy;const lx=dx*Math.cos(-rot)-dy*Math.sin(-rot),ly=dx*Math.sin(-rot)+dy*Math.cos(-rot);
  if(Math.abs(lx)<iw/2&&Math.abs(ly)<ih/2){illusDragMode='move';illusDragStart={x,y,ix:illusX,iy:illusY};}
}
function illusMove(e){
  if(!illusDragMode)return;e.preventDefault();
  const{x,y}=getEvtPt(e);const s=parseFloat(canvas.dataset.s)||1;
  if(illusDragMode==='move'){illusX=illusDragStart.ix+(x-illusDragStart.x)/s;illusY=illusDragStart.iy+(y-illusDragStart.y)/s;}
  else if(illusDragMode==='rotate'){const a=Math.atan2(y-illusDragStart.cy,x-illusDragStart.cx)-Math.atan2(illusDragStart.y-illusDragStart.cy,illusDragStart.x-illusDragStart.cx);illusRot=illusDragStart.rot+a*180/Math.PI;}
  else if(illusDragMode==='scale'){const dist=Math.hypot(x-illusDragStart.cx,y-illusDragStart.cy);const orig=Math.hypot(illusDragStart.hw,illusDragStart.hh);illusScale=Math.max(.02,illusDragStart.scale*(dist/orig));}
  render();drawIllusOv();updSliders();
}
function illusUp(){if(illusDragMode){illusDragMode=null;snapC();}}
ovCanvas.addEventListener('mousedown',illusDown);ovCanvas.addEventListener('mousemove',illusMove);ovCanvas.addEventListener('mouseup',illusUp);ovCanvas.addEventListener('mouseleave',illusUp);
ovCanvas.addEventListener('touchstart',illusDown,{passive:false});ovCanvas.addEventListener('touchmove',illusMove,{passive:false});ovCanvas.addEventListener('touchend',illusUp);
function updSliders(){
  const ss=document.getElementById('sl-sc'),rs=document.getElementById('sl-rt');
  const sv=document.getElementById('vl-sc'),rv=document.getElementById('vl-rt');
  if(ss){ss.value=Math.round(illusScale*100);if(sv)sv.textContent=Math.round(illusScale*100)+'%';}
  if(rs){rs.value=Math.round(illusRot);if(rv)rv.textContent=Math.round(illusRot)+'°';}
}

function buildUI(){
  const wd=getWD();
  const si=document.getElementById('sidebar-inner');
  if(!si)return;
  layers.forEach(l=>{
    if(l.role==='date'&&l.group&&groups[l.group]){
      const g=groups[l.group];
      const dayIdx=g.day?DAYS.indexOf(g.day):-1;
      if(dayIdx>=0&&dayIdx<7){const parts=wd[dayIdx].split('/');l.text=parts[parts.length-1];}
    }
  });
  render();
  const usedGids=[...new Set(layers.filter(l=>l.group).map(l=>l.group))].filter(gid=>groups[gid]);
  let html='';

  // ── 주 선택 (사이드바 상단) ──
  const wr=getWeekRange();
  html+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 2px">
    <button class="wnav-btn" onclick="changeWeek(-1)" id="btn-prev-week" ${weekOffset<=0?'disabled':''} style="width:30px;height:30px;border-radius:8px">‹</button>
    <div style="flex:1;text-align:center">
      <div style="font-size:12px;font-weight:700;color:var(--text-2)">${wr.label}</div>
      <div style="font-size:10px;color:var(--text-3);margin-top:1px">${wr.range}</div>
    </div>
    <button class="wnav-btn" onclick="changeWeek(1)" id="btn-next-week" ${weekOffset>=2?'disabled':''} style="width:30px;height:30px;border-radius:8px">›</button>
  </div>`;

  // ── 이미지 업로드 ──
  html+=mkIllusCard();

  usedGids.forEach((gid,idx)=>{
    const g=groups[gid];if(!g)return;
    const hasDay=!!g.day;
    const dayIdx=hasDay?DAYS.indexOf(g.day):idx;
    const date=dayIdx>=0&&dayIdx<7?wd[dayIdx]:'';
    const label=hasDay?g.day:(g.name||('그룹'+(idx+1)));
    const isSat=g.day==='토',isSun=g.day==='일';
    const isOpen=openGid===gid;
    const btnCls='day-btn'+(isSat?' sat':isSun?' sun':'');
    html+='<div class="day-block'+(isOpen?' open':'')+'" id="db-'+gid+'">'+
      '<button class="'+btnCls+'" data-gid="'+gid+'" onclick="toggleDay(this.dataset.gid)">'+
        '<span class="day-btn-left">'+
          '<span class="day-name">'+label+'</span>'+
          (date?'<span class="day-date">'+date+'</span>':'')+
        '</span>'+
        '<span class="day-arrow">▼</span>'+
      '</button>'+
      '<div class="day-body">'+mkDayBody(gid)+'</div>'+
    '</div>';
  });
  if(!usedGids.length)html+='<div style="padding:20px;text-align:center;font-size:12px;color:var(--text-3)">그룹이 없습니다</div>';
  si.innerHTML=html;
}
function toggleDay(gid){
  openGid=openGid===gid?null:gid;
  document.querySelectorAll('.day-block').forEach(el=>el.classList.remove('open'));
  if(openGid){document.getElementById('db-'+openGid)?.classList.add('open');}
}

function illusScaleSlider(v){illusScale=v/100;document.getElementById('vl-sc').textContent=v+'%';render();drawIllusOv();}
function illusRotSlider(v){illusRot=parseFloat(v);document.getElementById('vl-rt').textContent=Math.round(v)+'°';render();drawIllusOv();}

function mkDayBody(gid){
  const gLs=layers.filter(l=>l.group===gid);
  const offL=gLs.find(l=>l.isOffImage);
  const ctLs=gLs.filter(l=>l.clientEditable&&l.type==='text'&&l.role!=='date');
  const isOff=!!(offL&&offL.visible===true);
  let html='';
  if(offL){
    html+='<div class="tog-card'+(isOff?' off-on':'')+'">'+
      '<span class="tl tl-off">📵 방송 OFF</span>'+
      '<label class="sw-wrap sw-off"><input type="checkbox"'+(isOff?' checked':'')+' data-gid="'+gid+'" onchange="toggleOff(this.dataset.gid,this.checked)"><span class="sw-sl"></span></label>'+
    '</div>';
  }
  if(!isOff&&ctLs.length){
    html+='<div class="fcard">'+

function mkField(l){
  const isM=(l.text||'').includes('\n');

  return '<div class="fwrap">'+
    '<div class="flbl"><span>'+esc(l.name)+'</span></div>'+
    (isM?'<textarea class="fctrl" '+attrs+' rows="3">'+esc(l.text||'')+'</textarea>'
        :'<input class="fctrl" type="text" '+attrs+' value="'+esc(l.text||'',1)+'">')+
  '</div>';

function selAll(el){setTimeout(()=>el.select(),0);}
function esc(s,q){s=String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');return q?s.replace(/"/g,'&quot;'):s;}

function toggleOff(gid,checked){

function snapC(){
  undoStack.push(JSON.stringify({layers:JSON.parse(JSON.stringify(layers)),il:illusData,ix:illusX,iy:illusY,isc:illusScale,ir:illusRot}));
  if(undoStack.length>40)undoStack.shift();
  try{localStorage.setItem(SK,JSON.stringify({layers,il:illusData,ix:illusX,iy:illusY,isc:illusScale,ir:illusRot}));}catch(e){}
}
function undoC(){
  if(!undoStack.length)return;
  const sv=JSON.parse(undoStack.pop());
  layers=sv.layers;illusData=sv.il||null;illusX=sv.ix||0;illusY=sv.iy||0;illusScale=sv.isc||1;illusRot=sv.ir||0;

}

  if(bgData){const img=gImg(bgData);if(img&&img.complete&&img.naturalWidth)c2.drawImage(img,0,0,canvasW,canvasH);}
  layers.forEach(l=>{
    if(l.visible===false)return;c2.globalAlpha=l.opacity??1;
    if(l.type==='image'&&l.src){const img=gImg(l.src);if(img&&img.complete&&img.naturalWidth){if(l.rotate){const cx=l.x+l.w/2,cy=l.y+l.h/2;c2.save();c2.translate(cx,cy);c2.rotate(l.rotate*Math.PI/180);c2.drawImage(img,-l.w/2,-l.h/2,l.w,l.h);c2.restore();}else c2.drawImage(img,l.x,l.y,l.w,l.h);}}
    else if(l.type==='text'){const fs=calcFit(l,c2);const lh=l.lineHeight||1.3,lns=(l.text||'').split(String.fromCharCode(10));c2.save();if(l.rotate){const cx=l.x+l.w/2,cy=l.y+l.h/2;c2.translate(cx,cy);c2.rotate(l.rotate*Math.PI/180);c2.translate(-cx,-cy);}c2.beginPath();c2.rect(l.x,l.y,l.w,l.h);c2.clip();c2.font=(l.fontWeight||'400')+' '+fs+"px '"+(l.fontFamily||'Geist')+"'";c2.letterSpacing=(l.letterSpacing||0)+'px';c2.fillStyle=l.color||'#fff';c2.textAlign=l.align||'center';c2.textBaseline='middle';const tH=lns.length*fs*lh;const sY=l.verticalAlign==='top'?l.y+fs*lh*.5:l.verticalAlign==='bottom'?l.y+l.h-tH+fs*lh*.5:l.y+(l.h-tH)/2+fs*lh*.5;const tX=l.align==='left'?l.x+4:l.align==='right'?l.x+l.w-4:l.x+l.w/2;lns.forEach((ln,i)=>c2.fillText(ln,tX,sY+i*fs*lh));c2.restore();}
    c2.globalAlpha=1;
  });
  return tmp;
}
function expPNG(){if(TRIAL_MODE){alert('체험 모드에서는 저장이 불가해요. 구매 후 이용해주세요!');return;}const a=document.createElement('a');a.href=buildExport().toDataURL('image/png');a.download='result.png';a.click();}

function applyTrialMode(){
  // PNG 저장 버튼 → 구매 유도로 변경
  const pngBtn=document.querySelector('.tb.tb-primary');
  if(pngBtn){pngBtn.innerHTML='🔒 구매 후 저장 가능';pngBtn.style.background='rgba(123,114,255,.2)';pngBtn.style.color='#7B72FF';pngBtn.style.boxShadow='none';pngBtn.onclick=()=>{location.href='/template-detail.html?id='+TEMPLATE_ID;};}
  // 마이페이지/로그아웃 버튼 → 로그인 버튼으로 교체
  const mpBtn=document.querySelector('a[href="/mypage.html"]');
  if(mpBtn)mpBtn.remove();
  const logoutBtn=document.getElementById('editor-logout-btn');
  if(logoutBtn){logoutBtn.textContent='로그인하기';logoutBtn.style.cssText='background:linear-gradient(135deg,#7B72FF,#A78BFA);color:#fff;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(123,114,255,.22);font-family:inherit';logoutBtn.onclick=()=>{location.href='/login.html?redirect='+encodeURIComponent(location.href.replace('&trial=true','').replace('trial=true&',''));};}
  // 워터마크 추가
  const wm=document.createElement('div');
  wm.id='trial-watermark';
  wm.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden;border-radius:inherit';
  let html='';
  for(let r=0;r<8;r++){for(let c=0;c<5;c++){html+=`<div style="position:absolute;left:${c*22}%;top:${r*14}%;color:rgba(123,114,255,0.45);font-size:18px;font-weight:800;font-family:sans-serif;transform:rotate(-28deg);white-space:nowrap;letter-spacing:.1em;user-select:none;text-shadow:0 1px 3px rgba(0,0,0,.15)">VKIT 체험판</div>`;}}
  wm.innerHTML=html;
  document.getElementById('canvas-cont').appendChild(wm);
  // 상단에 체험 배너
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,rgba(123,114,255,.95),rgba(167,139,250,.95));color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:700;z-index:9999;display:flex;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(10px)';
  banner.innerHTML=`⚠️ 체험 모드 — 편집 내용은 저장되지 않아요 <a href="/template-detail.html?id=${TEMPLATE_ID}" style="color:#fff;text-decoration:underline;font-weight:800">구매하러 가기 →</a>`;
  document.body.appendChild(banner);
}

canvas.addEventListener('dblclick',e=>{
  const s=parseFloat(canvas.dataset.s)||1;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)/s,my=(e.clientY-r.top)/s;
  for(let i=layers.length-1;i>=0;i--){
    const l=layers[i];
    if(!l.clientEditable||l.type!=='text'||l.visible===false)continue;
    if(mx>=l.x&&mx<=l.x+l.w&&my>=l.y&&my<=l.y+l.h){
      if(l.group&&openGid!==l.group){
        openGid=l.group;
        document.querySelectorAll('.day-block').forEach(el=>el.classList.remove('open'));
        document.getElementById('db-'+l.group)?.classList.add('open');
        setTimeout(()=>{
          const blk=document.getElementById('db-'+l.group);
          if(blk){
            // 사이드 패널 스크롤
            const panel=document.getElementById('sidebar-inner');
            if(panel){panel.scrollTo({top:blk.offsetTop-8,behavior:'smooth'});}
            else{blk.scrollIntoView({behavior:'smooth',block:'nearest'});}
          }
        },80);
      }
      openEdit(l.id);return;
    }
  }
});
function openEdit(id){
  const l=layers.find(ll=>ll.id===id);if(!l||l.type!=='text')return;
  const ov=document.getElementById('edit-ov');
  const ta=document.getElementById('edit-ta');
  const s=parseFloat(canvas.dataset.s)||1;
  const fs=(l.fontSize||30)*s;
  ta.style.cssText='left:'+l.x*s+'px;top:'+l.y*s+'px;width:'+l.w*s+'px;height:'+l.h*s+'px;font-size:'+fs+'px;font-family:'+"'"+(l.fontFamily||'Geist')+"'"+';font-weight:'+(l.fontWeight||'400')+';line-height:'+(l.lineHeight||1.3)+';text-align:'+(l.align||'center')+';display:block';
  ta.value=l.text||'';ov.classList.add('active');ta.focus();ta.select();
  ta.oninput=()=>{
    const ll=layers.find(ll=>ll.id===id);if(!ll)return;
    ll.text=ta.value;render();
    document.querySelectorAll('[data-id="'+id+'"]').forEach(el=>{if(el!==ta&&el.value!==ta.value)el.value=ta.value;});
  };
  ta.onkeydown=ev=>{if(ev.key==='Escape'){ev.preventDefault();closeEdit();}};
  ov.onmousedown=ev=>{if(ev.target===ov)closeEdit();};
}
function closeEdit(){
  document.getElementById('edit-ov')?.classList.remove('active');
  const ta=document.getElementById('edit-ta');if(ta)ta.style.display='none';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeEdit();if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoC();}});
window.addEventListener('resize',initCanvas);
window.addEventListener('load',()=>{
  // 로그아웃 버튼
  document.getElementById('editor-logout-btn')?.addEventListener('click',async()=>{
    for(const k of Object.keys(localStorage)){if(k.startsWith('sb-'))localStorage.removeItem(k);}
    location.href='/index.html';
  });
  initEditor();
});
</script>
