<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 — Vkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --violet:   #7B72FF;
  --pink:     #FF6EC7;
  --cyan:     #7EE6FF;
  --lavender: #C7BFFF;
  --bg:       #F0EFFF;
  --card:     rgba(255,255,255,0.72);
  --border:   rgba(180,170,255,0.28);
  --text:     #1A1830;
  --text-sub: #7B78A8;
  --shadow:   rgba(123,114,255,0.16);
  --glow-v:   rgba(123,114,255,0.22);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

/* 배경 메시 */
.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 80% -10%, rgba(123,114,255,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at -10% 60%, rgba(255,110,199,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 100%, rgba(126,230,255,0.12) 0%, transparent 70%),
    linear-gradient(160deg, #EDEAFF 0%, #F6F4FF 45%, #FFF0FA 100%);
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(28px) saturate(160%);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:28px;
  padding:44px 40px 40px;
  box-shadow:0 20px 60px rgba(123,114,255,0.12),0 4px 16px rgba(0,0,0,0.05);
}

/* 로고 */
.logo{
  display:flex;align-items:center;justify-content:center;gap:9px;
  text-decoration:none;
  font-family:'Nunito',sans-serif;
  font-size:24px;font-weight:900;
  color:var(--text);
  letter-spacing:-0.5px;
  margin-bottom:32px;
}
.logo-icon{
  width:36px;height:36px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}

/* 아이콘 서클 */
.icon-circle{
  width:64px;height:64px;
  border-radius:20px;
  background:linear-gradient(135deg, rgba(123,114,255,0.12), rgba(255,110,199,0.1));
  border:1px solid rgba(123,114,255,0.15);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:28px;
}

.title{
  font-size:22px;font-weight:800;
  color:var(--text);
  text-align:center;
  margin-bottom:6px;
  letter-spacing:-0.4px;
}
.sub{
  font-size:13px;color:var(--text-sub);
  text-align:center;
  margin-bottom:32px;
  line-height:1.6;
}

/* 폼 */
.form-group{
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:14px;
}
.form-label{
  font-size:12px;font-weight:700;
  color:var(--text-sub);letter-spacing:0.3px;
}
.input-wrap{
  position:relative;
}
.form-input{
  width:100%;padding:12px 42px 12px 16px;
  border-radius:12px;
  border:1px solid rgba(180,170,255,0.3);
  background:rgba(255,255,255,0.7);
  font-size:14px;font-weight:500;
  color:var(--text);
  font-family:'Pretendard',sans-serif;
  outline:none;
  transition:all 0.2s;
}
.form-input:focus{
  border-color:var(--violet);
  background:#fff;
  box-shadow:0 0 0 3px rgba(123,114,255,0.12);
}
.form-input::placeholder{color:rgba(123,120,168,0.45)}

/* 비밀번호 토글 */
.pw-toggle{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--text-sub);padding:2px;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.15s;
}
.pw-toggle:hover{color:var(--violet)}

/* 강도 바 */
.strength-wrap{
  margin-top:8px;
  display:none;
}
.strength-wrap.show{display:block}
.strength-bars{
  display:flex;gap:4px;margin-bottom:4px;
}
.strength-bar{
  flex:1;height:3px;border-radius:99px;
  background:rgba(180,170,255,0.2);
  transition:background 0.3s;
}
.strength-bar.weak{background:#FF6B6B}
.strength-bar.medium{background:#FFB547}
.strength-bar.strong{background:#50C878}
.strength-label{
  font-size:11px;font-weight:600;color:var(--text-sub);
}

/* 버튼 */
.btn-submit{
  width:100%;padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--violet),#A78BFA);
  color:#fff;
  font-size:14px;font-weight:800;
  border:none;cursor:pointer;
  font-family:'Pretendard',sans-serif;
  box-shadow:0 6px 20px var(--glow-v);
  transition:all 0.22s;
  margin-top:4px;
  letter-spacing:0.2px;
}
.btn-submit:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 28px var(--glow-v);
}
.btn-submit:disabled{
  opacity:0.6;cursor:not-allowed;transform:none;
}

/* 메시지 */
.msg{
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;font-weight:600;
  margin-bottom:14px;
  display:none;
  line-height:1.5;
}
.msg.error{
  background:rgba(255,80,80,0.08);
  border:1px solid rgba(255,80,80,0.2);
  color:#e84040;
}
.msg.success{
  background:rgba(80,200,120,0.08);
  border:1px solid rgba(80,200,120,0.2);
  color:#2a9d5c;
}
.msg.show{display:block}

/* 성공 화면 */
.success-view{
  display:none;
  text-align:center;
}
.success-view.show{display:block}
.success-icon{
  width:72px;height:72px;
  border-radius:22px;
  background:linear-gradient(135deg, rgba(80,200,120,0.15), rgba(123,114,255,0.1));
  border:1px solid rgba(80,200,120,0.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:32px;
  animation:pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}
.success-title{
  font-size:20px;font-weight:800;
  color:var(--text);
  margin-bottom:8px;
  letter-spacing:-0.3px;
}
.success-sub{
  font-size:13px;color:var(--text-sub);
  margin-bottom:28px;
  line-height:1.6;
}

/* 푸터 링크 */
.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;color:var(--text-sub);
}
.footer a{
  color:var(--violet);font-weight:700;
  text-decoration:none;
}
.footer a:hover{text-decoration:underline}

/* 유효하지 않은 링크 화면 */
.invalid-view{
  display:none;
  text-align:center;
}
.invalid-view.show{display:block}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="wrap">
  <div class="card">

    <!-- 로고 -->
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 34 34" fill="none">
          <rect width="34" height="34" rx="10" fill="url(#lBg)"/>
          <rect x="10" y="14" width="14" height="14" rx="4" fill="url(#lB)" opacity="0.85"/>
          <rect x="14" y="8" width="13" height="13" rx="4" fill="url(#lP)" opacity="0.9"/>
          <circle cx="10" cy="22" r="3.5" fill="url(#lC)" opacity="0.8"/>
          <defs>
            <linearGradient id="lBg" x1="0" y1="0" x2="34" y2="34"><stop stop-color="#EDE9FF"/><stop offset="1" stop-color="#F5F0FF"/></linearGradient>
            <linearGradient id="lB" x1="10" y1="14" x2="24" y2="28"><stop stop-color="#7B72FF"/><stop offset="1" stop-color="#A5C8FF"/></linearGradient>
            <linearGradient id="lP" x1="14" y1="8" x2="27" y2="21"><stop stop-color="#FF8ECF"/><stop offset="1" stop-color="#C7BFFF"/></linearGradient>
            <linearGradient id="lC" x1="6.5" y1="18.5" x2="13.5" y2="25.5"><stop stop-color="#7EE6FF"/><stop offset="1" stop-color="#7B72FF"/></linearGradient>
          </defs>
        </svg>
      </div>
      Vkit
    </a>

    <!-- 유효하지 않은 링크 -->
    <div class="invalid-view" id="invalid-view">
      <div class="icon-circle">🔗</div>
      <div class="title">링크가 만료됐어요</div>
      <div class="sub">비밀번호 재설정 링크가 유효하지 않거나<br>이미 사용된 링크예요.</div>
      <a href="login.html">
        <button class="btn-submit">로그인 페이지로 돌아가기</button>
      </a>
    </div>

    <!-- 재설정 폼 -->
    <div id="reset-view">
      <div class="icon-circle">🔑</div>
      <div class="title">새 비밀번호 설정</div>
      <div class="sub">새로 사용할 비밀번호를 입력해주세요.<br>8자 이상이면 돼요!</div>

      <div class="msg" id="msg"></div>

      <div class="form-group">
        <label class="form-label">새 비밀번호</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="pw1" placeholder="8자 이상 입력" oninput="checkStrength(this.value)">
          <button class="pw-toggle" type="button" onclick="togglePw('pw1', this)" aria-label="비밀번호 표시/숨기기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-wrap" id="strength-wrap">
          <div class="strength-bars">
            <div class="strength-bar" id="sb1"></div>
            <div class="strength-bar" id="sb2"></div>
            <div class="strength-bar" id="sb3"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="pw2" placeholder="비밀번호 다시 입력" onkeydown="if(event.key==='Enter')doReset()">
          <button class="pw-toggle" type="button" onclick="togglePw('pw2', this)" aria-label="비밀번호 표시/숨기기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="btn-reset" onclick="doReset()">비밀번호 변경하기</button>

      <div class="footer">
        <a href="login.html">← 로그인으로 돌아가기</a>
      </div>
    </div>

    <!-- 성공 화면 -->
    <div class="success-view" id="success-view">
      <div class="success-icon">✅</div>
      <div class="success-title">비밀번호가 변경됐어요!</div>
      <div class="success-sub">새 비밀번호로 로그인할 수 있어요.<br>잠시 후 자동으로 이동할게요.</div>
      <a href="login.html">
        <button class="btn-submit">로그인하러 가기</button>
      </a>
    </div>

  </div>
</div>

<script>
const SB_URL = 'https://fvuyimvkozbcnzudxsdp.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dXlpbXZrb3piY256dWR4c2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg0MTAsImV4cCI6MjA5NTgwNDQxMH0.gxl9EGtn8zTHmzzp_8EEKipGCik6t5q5WeU1sHnKW4I';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// URL 해시에서 토큰 확인 (Supabase가 #access_token=...&type=recovery 형태로 보냄)
async function init() {
  // Supabase v2: onAuthStateChange로 recovery 이벤트 감지
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // 유효한 recovery 세션 — 폼 표시 (이미 기본값)
    } else if (event === 'SIGNED_IN' && window._resetDone) {
      // 재설정 완료 후 로그인됨
    }
  });

  // URL 파라미터 확인 (type=recovery 없으면 유효하지 않은 접근)
  const hash = window.location.hash;
  if (!hash.includes('type=recovery') && !hash.includes('access_token')) {
    // 직접 접근한 경우 — 유효하지 않은 링크 화면
    document.getElementById('reset-view').style.display = 'none';
    document.getElementById('invalid-view').classList.add('show');
  }
}

init();

// 비밀번호 강도 체크
function checkStrength(val) {
  const wrap = document.getElementById('strength-wrap');
  if (!val) { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');

  const bars = [document.getElementById('sb1'), document.getElementById('sb2'), document.getElementById('sb3')];
  const label = document.getElementById('strength-label');
  bars.forEach(b => b.className = 'strength-bar');

  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
  if (/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(val) || val.length >= 12) score++;

  if (score === 1) {
    bars[0].classList.add('weak');
    label.textContent = '약함';
    label.style.color = '#FF6B6B';
  } else if (score === 2) {
    bars[0].classList.add('medium'); bars[1].classList.add('medium');
    label.textContent = '보통';
    label.style.color = '#FFB547';
  } else {
    bars.forEach(b => b.classList.add('strong'));
    label.textContent = '강함 👍';
    label.style.color = '#50C878';
  }
}

// 비밀번호 표시/숨기기
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.querySelector('svg').style.opacity = isText ? '1' : '0.4';
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type} show`;
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;

  if (!pw1) return showMsg('새 비밀번호를 입력해주세요', 'error');
  if (pw1.length < 8) return showMsg('비밀번호는 8자 이상이어야 해요', 'error');
  if (pw1 !== pw2) return showMsg('비밀번호가 일치하지 않아요', 'error');

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = '변경 중...';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    showMsg(error.message || '오류가 발생했어요. 다시 시도해주세요.', 'error');
    btn.disabled = false;
    btn.textContent = '비밀번호 변경하기';
  } else {
    window._resetDone = true;
    document.getElementById('reset-view').style.display = 'none';
    document.getElementById('success-view').classList.add('show');
    // 3초 후 자동 이동
    setTimeout(() => location.href = 'login.html', 3000);
  }
}
</script>
</body>
</html>
